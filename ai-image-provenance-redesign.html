<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>生图溯源 · 维度裁决</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#f2f3f5; --surface:#fff; --ink:#181a1f; --ink-2:#3a3f47;
    --muted:#6b7280; --faint:#9aa0aa; --line:#e6e8ec; --line-2:#eef0f3;
    --red:#d92d20; --red-wash:#fdeceb; --red-line:#f4c7c3;
    --green:#0a7a57; --green-wash:#e7f4ee; --green-line:#bfe3d4;
    --over:#9aa0aa; --over-wash:#f6f7f8;
    --amber:#a86a0b; --amber-wash:#fbf2d8; --amber-line:#e7c766;
    --sans:"Inter","PingFang SC","Noto Sans SC",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
  body{font-family:var(--sans);color:var(--ink);background:var(--paper);min-height:100vh;padding:34px 24px 90px;-webkit-font-smoothing:antialiased;line-height:1.5}
  svg{display:block}
  .mono{font-family:var(--mono);font-feature-settings:"tnum" 1}
  .shell{max-width:1080px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 0 rgba(24,26,31,.02),0 18px 40px -30px rgba(24,26,31,.3)}

  /* layer chip (secondary axis) */
  .lchip{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.02em;padding:2px 7px;border-radius:5px;flex:none;background:var(--paper);color:var(--ink-2);border:1px solid var(--line)}
  .lchip.pf{color:#b23b2f;background:#fbeeec;border-color:#f0d2ce}
  .lchip.ct{color:#1f6fb8;background:#e9f1fb;border-color:#cfe1f4}
  .lchip.br{color:#5b45c9;background:#efecfb;border-color:#dcd5f4}
  .lchip.sp{color:#5a6470;background:#eef0f3;border-color:#dfe3e8}

  /* ============ HERO · final artifact ============ */
  .hero{display:grid;grid-template-columns:296px 1fr;gap:0;overflow:hidden}
  .hero-shot{padding:18px;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:12px;background:linear-gradient(180deg,#fafbfc,#f4f5f7)}
  .frame{position:relative;border-radius:12px;background:linear-gradient(180deg,#f6f7f9,#eceef2);border:1px solid var(--line);overflow:hidden;aspect-ratio:4/5;display:grid;grid-template-rows:auto 1fr auto}
  .frame .badge{position:absolute;top:11px;left:11px;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.05em;color:var(--ink-2);background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:6px;padding:4px 8px}
  .frame .brand{text-align:center;padding-top:36px;font-weight:700;font-size:22px;letter-spacing:.34em;color:#2b2e34;text-indent:.34em}
  .frame .shirt{align-self:center;justify-self:center;color:#aab0ba}
  .frame .cap{text-align:center;padding-bottom:14px;font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--faint)}

  .hero-body{padding:20px 22px}
  .hero-body .eyebrow{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
  .hero-body h1{font-size:20px;font-weight:700;letter-spacing:-.015em;margin-top:5px}
  .stat{display:flex;gap:20px;margin-top:14px;padding-bottom:16px;border-bottom:1px solid var(--line-2)}
  .stat .s .n{font-family:var(--mono);font-size:19px;font-weight:600;letter-spacing:-.02em;line-height:1}
  .stat .s .l{font-size:10.5px;color:var(--muted);margin-top:5px}
  .stat .s.red .n{color:var(--red)} .stat .s.amber .n{color:var(--amber)} .stat .s.green .n{color:var(--green)}

  .compiled{margin-top:15px}
  .clabel{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:9px;display:flex;align-items:center;gap:8px}
  .clabel .hint{font-family:var(--sans);letter-spacing:0;text-transform:none;font-weight:400;color:var(--faint);font-size:11px}
  .frags{display:flex;flex-wrap:wrap;gap:6px}
  .frag{font-family:var(--mono);font-size:11.5px;color:#065a41;background:var(--green-wash);border:1px solid var(--green-line);border-radius:7px;padding:5px 9px;cursor:pointer;transition:box-shadow .15s,background .15s}
  .frag.base{color:var(--muted);background:var(--surface);border-color:var(--line)}
  .frag:hover{box-shadow:0 0 0 2px var(--green-line)}
  .frag:focus-visible{outline:2px solid var(--green);outline-offset:1px}
  .negs{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .neg{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:7px;padding:4px 9px;display:inline-flex;align-items:center;gap:6px}
  .neg .x{color:var(--red);opacity:.65}

  /* ============ section head ============ */
  .sec-head{display:flex;align-items:baseline;gap:12px;padding:2px 4px 0}
  .sec-head h2{font-size:15px;font-weight:700;letter-spacing:-.01em}
  .sec-head .sub{font-size:12px;color:var(--muted)}
  .sec-head .legend{margin-left:auto;display:flex;gap:14px}
  .sec-head .legend span{font-size:11px;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
  .dot{width:8px;height:8px;border-radius:99px;flex:none}
  .dot.g{background:var(--green)} .dot.o{background:var(--over)} .dot.r{background:var(--red)}

  /* ============ dimension verdict blocks ============ */
  .dim{padding:0}
  .dim-head{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line-2)}
  .dim-head .name{font-size:15px;font-weight:700;letter-spacing:-.01em}
  .dim-head .gov{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.02em}
  .verdict{margin-left:auto;display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:500;padding:4px 10px;border-radius:999px;flex:none}
  .verdict.arb{color:var(--amber);background:var(--amber-wash);border:1px solid var(--amber-line)}
  .verdict.clean{color:var(--green);background:var(--green-wash);border:1px solid var(--green-line)}
  .verdict .mono{font-weight:600}

  .cands{padding:8px 10px 12px}
  .cand{display:grid;grid-template-columns:16px 52px 1fr;align-items:start;gap:11px;padding:11px 8px;border-radius:10px;position:relative}
  .cand + .cand{border-top:1px solid var(--line-2)}
  .cand.win{background:linear-gradient(90deg,var(--green-wash),transparent 60%)}
  .cand-stat{width:16px;height:16px;margin-top:2px;display:grid;place-items:center;border-radius:5px;flex:none}
  .cand.inject .cand-stat{color:var(--green);background:var(--green-wash)}
  .cand.over .cand-stat{color:var(--over);background:var(--over-wash)}
  .cand-meta{display:flex;flex-direction:column;gap:5px;align-items:flex-start;padding-top:1px}
  .cand-rid{font-family:var(--mono);font-size:9.5px;color:var(--faint)}
  .cand-body{min-width:0}
  .cand-rule{font-size:13px;font-weight:500;color:var(--ink);letter-spacing:-.005em}
  .cand.over .cand-rule{color:var(--muted)}
  .cand-evi{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:3px}
  .cand-evi b{color:var(--green);font-weight:600}
  .cand-out{margin-top:8px;font-family:var(--mono);font-size:11.5px;line-height:1.55;display:flex;gap:8px;align-items:baseline}
  .cand-out .ar{flex:none;font-weight:600}
  .cand.inject .cand-out{color:#065a41}
  .cand.inject .cand-out .ar{color:var(--green)}
  .cand.over .cand-out{color:var(--over)}
  .cand.over .cand-out .toks{text-decoration:line-through;text-decoration-color:#c4c9d0}
  .cand.over .cand-out .ar{color:var(--over)}
  .cut{margin-top:7px;font-size:11.5px;color:var(--amber);background:var(--amber-wash);border:1px solid var(--amber-line);border-radius:8px;padding:6px 10px;display:inline-flex;align-items:center;gap:7px}
  .cut svg{flex:none}
  .cut b{font-family:var(--mono);font-weight:600;color:#7a4e08}

  /* ============ redlines ============ */
  .redlines .rl{display:grid;grid-template-columns:16px 52px 1fr;align-items:start;gap:11px;padding:12px 8px}
  .redlines .rl + .rl{border-top:1px solid var(--line-2)}
  .redlines .cand-stat{color:var(--red);background:var(--red-wash)}
  .rl-out{margin-top:7px;font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;gap:8px;align-items:baseline}
  .rl-out .x{color:var(--red);flex:none;font-weight:600}
  .redlines .inner{padding:8px 10px 12px}

  @media (max-width:820px){
    .hero{grid-template-columns:1fr}
    .hero-shot{border-right:0;border-bottom:1px solid var(--line);flex-direction:row}
    .hero-shot .frame{width:150px;flex:none;aspect-ratio:4/5}
    .cand,.redlines .rl{grid-template-columns:16px 1fr}
    .cand-meta{flex-direction:row;grid-column:2}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto}}
</style>
</head>
<body>
<div class="shell">

  <!-- ============ HERO ============ -->
  <section class="card hero">
    <div class="hero-shot">
      <div class="frame">
        <span class="badge">PREMIUM · 品牌留白 · 高级简约</span>
        <div class="brand">PRADA</div>
        <svg class="shirt" width="104" height="112" viewBox="0 0 120 128" fill="none">
          <path d="M42 14l-26 14 8 20 12-5v66h48V57l12 5 8-20-26-14-9 8h-18l-9-8z" fill="#dfe3e9" stroke="#c4cad3" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M51 14c0 6 4 10 9 10s9-4 9-10" stroke="#c4cad3" stroke-width="1.5" fill="none"/>
        </svg>
        <div class="cap">简约风 · 基础百搭</div>
      </div>
    </div>

    <div class="hero-body">
      <div class="eyebrow">最终产物 · 一类货 / 商详 / SKU·618</div>
      <h1>纯棉基础款女士衬衫</h1>
      <div class="stat">
        <div class="s"><div class="n">10</div><div class="l">召回命中</div></div>
        <div class="s green"><div class="n">3</div><div class="l">维度注入</div></div>
        <div class="s amber"><div class="n">2</div><div class="l">维度取舍</div></div>
        <div class="s red"><div class="n">3</div><div class="l">合规红线</div></div>
      </div>

      <div class="compiled">
        <div class="clabel">正向 Prompt<span class="hint">· 按维度裁决编译，点击片段定位来源</span></div>
        <div class="frags" id="frags"></div>
      </div>
      <div class="compiled">
        <div class="clabel">负向约束<span class="hint">· 合规红线转化</span></div>
        <div class="negs" id="negs"></div>
      </div>
    </div>
  </section>

  <!-- ============ DIMENSION VERDICTS ============ -->
  <div class="sec-head">
    <h2>按维度裁决</h2>
    <span class="sub">每个维度多层级规则竞争 · 高优先级裁定注入</span>
    <div class="legend">
      <span><i class="dot g"></i>注入</span>
      <span><i class="dot o"></i>被覆盖</span>
    </div>
  </div>
  <div id="dims"></div>

  <!-- ============ REDLINES ============ -->
  <div class="sec-head">
    <h2>合规红线</h2>
    <span class="sub">平台硬拦截 · 强制转为负向约束</span>
  </div>
  <div id="redlines"></div>

</div>

<script>
/* ---------- icons ---------- */
const IC={
  check:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M5 12l4 4L19 6" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  slash:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"/><path d="M7 7l10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  shield:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M12 3l7 3v5c0 4.5-3 7.2-7 8-4-.8-7-3.5-7-8V6l7-3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>',
  gavel:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M4 20h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M13 7l4 4-6 6-4-4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M14 4l6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
  cut:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 4l9 16H3z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M12 10v4M12 17h.01" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>',
};
const LNAME={pf:"平台",ct:"品类",br:"品牌",sp:"SPU"};
const lchip=l=>`<span class="lchip ${l}">${LNAME[l]}</span>`;

/* ---------- data: organized BY DIMENSION (the resolution axis) ---------- */
const dims=[
  { name:"商品主体", gov:"SUBJECT", arbitrated:"R-PF-06",
    cands:[
      { id:"R-SP-01", layer:"sp", status:"inject", rule:"商品本体：纯棉基础款女士衬衫（女士上衣 · 纯棉）", evi:"SKU 结构化属性", out:["纯棉基础款女士衬衫","纯棉 女士上衣"] },
      { id:"R-PF-06", layer:"pf", status:"inject", win:true, rule:"高级简约风采用纯商品实拍，不引入模特 / 场景干扰", evi:"高级简约默认策略 · 覆盖 R-CT-01", out:["product photography"] },
      { id:"R-PF-04", layer:"pf", status:"inject", rule:"加购页强化尺码、材质、细节特写等信任信息", evi:"加购转化 <b>+11%</b> · AB 聚合", out:["size reference","fabric close-up","detail shots"] },
      { id:"R-CT-01", layer:"ct", status:"over", rule:"「女士上衣」商详首图模特实拍上身，转化高于平铺挂拍", out:["on-model shot","real fabric drape","natural pose"], cut:{by:"R-PF-06", give:"放弃品类 +22% 转化"} },
    ]},
  { name:"背景场景", gov:"BACKGROUND", arbitrated:"R-BR-01",
    cands:[
      { id:"R-BR-01", layer:"br", status:"inject", win:true, rule:"「简约风」统一浅灰纯色背景 + 居中构图，保持高级留白，禁止促销贴片", evi:"品牌硬约束 · 主图 CTR <b>+14%</b> · 覆盖 R-CT-02", out:["clean light-gray solid background","centered minimal composition","premium negative space"] },
      { id:"R-CT-02", layer:"ct", status:"over", rule:"夏季「冰丝 / 凉感 / 防晒」卖点热度突增，建议前置清凉感场景", out:["summer cool refreshing scene","ice-silk texture highlight"], cut:{by:"R-BR-01", give:"放弃 +180% 搜索热度红利"} },
    ]},
  { name:"版式", gov:"TYPOGRAPHY", arbitrated:null,
    cands:[
      { id:"R-BR-02", layer:"br", status:"inject", rule:"「简约风」文案版式统一 thin sans-serif、克制间距，弱化促销感", evi:"品牌视觉一致性", out:["thin sans-serif typography","calm spacing"] },
    ]},
];

const redlines=[
  { id:"R-PF-01", layer:"pf", rule:"主图 / 文案禁用「最 / 第一 / 国家级」等绝对化限词，禁用虚假宣传与医疗功效词", out:["no superlative / absolute claims","no fake medical efficacy","no exclamation promo copy"] },
  { id:"R-PF-02", layer:"pf", rule:"主图禁止出现非授权品牌 Logo、明星肖像与他人版权素材", out:["no unauthorized brand logo","no celebrity face","no copyrighted material"] },
  { id:"R-PF-03", layer:"pf", rule:"主图背景禁止大面积纯黑 / 纯红等违反平台展示规范的底色", out:["no full black / full red background"] },
];

/* ---------- compiled prompt (hero) : positive frags trace to dim ---------- */
const posFrags=[];
dims.forEach((d,di)=>d.cands.forEach(c=>{ if(c.status==="inject") c.out.forEach(t=>posFrags.push({t,dim:di,base:c.layer==="sp"})); }));
const negFrags=[];
redlines.forEach(r=>r.out.forEach(t=>negFrags.push(t)));
dims[1].cands[0].out; // bg brand also bans stickers -> add one negative
negFrags.push("no promotional stickers");

document.getElementById("frags").innerHTML=posFrags.map(f=>
  `<button class="frag ${f.base?'base':''}" data-dim="${f.dim}">${f.t}</button>`).join("");
document.getElementById("negs").innerHTML=negFrags.map(t=>
  `<span class="neg"><span class="x">✕</span>${t}</span>`).join("");

/* ---------- dimension blocks ---------- */
document.getElementById("dims").innerHTML=dims.map((d,di)=>{
  const verdict = d.arbitrated
    ? `<span class="verdict arb">${IC.gavel} 取舍裁定 <span class="mono">${d.arbitrated}</span> 胜出</span>`
    : `<span class="verdict clean">${IC.check} 无冲突 · 直接注入</span>`;
  const cands=d.cands.map(c=>{
    const stat = c.status==="inject"?IC.check:IC.slash;
    const evi = c.evi?`<div class="cand-evi">${c.evi}</div>`:"";
    const arrow = c.status==="inject"?"↳ 注入":"✕ 未注入";
    const out = `<div class="cand-out"><span class="ar">${arrow}</span><span class="toks">${c.out.join(", ")}</span></div>`;
    const cut = c.cut?`<div class="cut">${IC.cut}被 <b>${c.cut.by}</b> 覆盖 · ${c.cut.give}</div>`:"";
    return `<div class="cand ${c.status} ${c.win?'win':''}" id="dimc-${di}-${c.id}">
      <span class="cand-stat">${stat}</span>
      <div class="cand-meta">${lchip(c.layer)}<span class="cand-rid">${c.id}</span></div>
      <div class="cand-body"><div class="cand-rule">${c.rule}</div>${evi}${out}${cut}</div>
    </div>`;
  }).join("");
  return `<section class="card dim" id="dim-${di}">
    <div class="dim-head"><span class="name">${d.name}</span><span class="gov">${d.gov}</span>${verdict}</div>
    <div class="cands">${cands}</div>
  </section>`;
}).join("");

/* ---------- redline block ---------- */
document.getElementById("redlines").innerHTML=`<section class="card redlines"><div class="inner">${
  redlines.map(r=>`<div class="rl">
    <span class="cand-stat">${IC.shield}</span>
    <div class="cand-meta">${lchip(r.layer)}<span class="cand-rid">${r.id}</span></div>
    <div class="cand-body"><div class="cand-rule">${r.rule}</div>
      <div class="rl-out"><span class="x">✕</span><span>${r.out.join(", ")}</span></div></div>
  </div>`).join("")
}</div></section>`;

/* ---------- interaction: click a compiled frag -> jump to its dimension ---------- */
document.addEventListener("click",e=>{
  const f=e.target.closest(".frag[data-dim]");
  if(f){
    const t=document.getElementById("dim-"+f.dataset.dim);
    if(t){ t.scrollIntoView({block:"center"}); t.animate?.([{boxShadow:"0 0 0 2px var(--amber-line)"},{boxShadow:"0 0 0 0 transparent"}],{duration:900}); }
  }
});
</script>
</body>
</html>
