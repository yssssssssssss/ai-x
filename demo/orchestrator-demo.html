<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0b0f19" />
<title>用研 Agent Harness · Orchestrator</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0b0f19;
    --bg-side: #0e131f;
    --bg-elev: #121826;
    --bg-elev-2: #1a2233;
    --border: #243044;
    --border-strong: #33415c;
    --text: #e7ecf4;
    --text-dim: #9aa7bd;
    --text-faint: #64748b;
    --accent: #6366f1;
    --accent-soft: #6366f120;
    --accent-strong: #818cf8;
    --st-done: #34d399;
    --st-run: #6366f1;
    --st-assume: #fbbf24;
    --radius: 14px;
    --radius-sm: 9px;
    --shadow: 0 8px 30px -12px rgba(0,0,0,.6);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --mono: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font); font-size: 14px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    height: 100vh; overflow: hidden;
  }
  h1,h2,h3,h4 { text-wrap: balance; margin: 0; font-weight: 650; }
  .num { font-variant-numeric: tabular-nums; }
  button { font-family: var(--font); }

  a.skip { position: absolute; left: -999px; top: 8px; background: var(--accent); color:#fff; padding: 8px 14px; border-radius: var(--radius-sm); z-index: 100; text-decoration: none; }
  a.skip:focus { left: 8px; }
  .sr-only { position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

  .app { display: grid; grid-template-columns: 264px 1fr; height: 100vh; }
  @media (max-width: 860px) { .app { grid-template-columns: 0 1fr; } .sidebar { display: none; } }

  /* ---------- 左侧栏 ---------- */
  .sidebar {
    background: var(--bg-side); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 14px 12px; gap: 6px; min-height: 0;
  }
  .brand { display: flex; align-items: center; gap: 10px; padding: 6px 8px 12px; }
  .brand .logo { width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0; background: linear-gradient(135deg, var(--accent), var(--accent-strong)); display: grid; place-items: center; font-weight: 800; color: #fff; font-size: 15px; }
  .brand .bt { line-height: 1.2; }
  .brand .bt b { font-size: 13.5px; display: block; }
  .brand .bt span { font-size: 11px; color: var(--text-faint); }

  .new-task {
    display: flex; align-items: center; gap: 8px; width: 100%; cursor: pointer;
    background: var(--accent-soft); color: var(--accent-strong);
    border: 1px solid #6366f140; border-radius: var(--radius-sm);
    padding: 10px 12px; font-size: 13.5px; font-weight: 600;
    transition: background .15s ease, border-color .15s ease;
  }
  .new-task:hover { background: #6366f130; border-color: var(--accent); }
  .new-task:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-soft); }

  .side-scroll { flex: 1; overflow-y: auto; min-height: 0; margin: 4px 0; padding-right: 2px; }
  .side-group { margin-top: 14px; }
  .side-group > .lbl { font-size: 11px; letter-spacing: .05em; text-transform: uppercase; color: var(--text-faint); padding: 0 8px 6px; }
  .side-item {
    display: flex; align-items: center; gap: 9px; width: 100%; cursor: pointer; text-align: left;
    background: transparent; color: var(--text-dim); border: none; border-radius: var(--radius-sm);
    padding: 8px 8px; font-size: 13px; line-height: 1.35;
    transition: background .12s ease, color .12s ease;
  }
  .side-item:hover { background: var(--bg-elev-2); color: var(--text); }
  .side-item:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-soft); }
  .side-item[aria-current="true"] { background: var(--bg-elev-2); color: var(--text); }
  .side-item .ic { width: 16px; flex-shrink: 0; opacity: .8; text-align: center; }
  .side-item .tx { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .side-foot { border-top: 1px solid var(--border); padding: 12px 8px 4px; font-size: 11px; color: var(--text-faint); line-height: 1.7; }
  .side-foot b { color: var(--accent-strong); font-weight: 600; }

  /* ---------- 主区 ---------- */
  .main { display: flex; flex-direction: column; min-width: 0; height: 100vh; }
  .thread { flex: 1; overflow-y: auto; min-height: 0; scroll-behavior: smooth; }
  .thread-inner { max-width: 860px; margin: 0 auto; padding: 28px 24px 24px; }

  /* 欢迎态 */
  .welcome { height: 100%; min-height: 62vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .welcome .wl-logo { width: 52px; height: 52px; border-radius: 15px; background: linear-gradient(135deg, var(--accent), var(--accent-strong)); display: grid; place-items: center; font-weight: 800; color:#fff; font-size: 24px; margin-bottom: 18px; }
  .welcome h2 { font-size: 22px; margin-bottom: 8px; }
  .welcome p { color: var(--text-dim); max-width: 470px; margin: 0 0 24px; }
  .suggest { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 640px; }
  .suggest button {
    cursor: pointer; background: var(--bg-elev); color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 999px; padding: 9px 15px; font-size: 13px;
    transition: border-color .15s ease, color .15s ease, transform .1s ease;
  }
  .suggest button:hover { border-color: var(--accent); color: var(--text); }
  .suggest button:active { transform: translateY(1px); }
  .suggest button:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-soft); }

  /* 气泡 */
  .turn { margin-bottom: 22px; }
  .bubble-user { display: flex; justify-content: flex-end; margin-bottom: 18px; }
  .bubble-user .b {
    background: linear-gradient(135deg, var(--accent), var(--accent-strong)); color: #fff;
    padding: 11px 16px; border-radius: 16px 16px 4px 16px; max-width: 78%; font-size: 14px; box-shadow: var(--shadow);
  }
  .bubble-sys { display: flex; gap: 12px; }
  .bubble-sys .avatar { width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0; background: var(--bg-elev-2); border: 1px solid var(--border); display: grid; place-items: center; font-size: 14px; }
  .bubble-sys .body { min-width: 0; flex: 1; }

  .thinking { display: inline-flex; align-items: center; gap: 9px; color: var(--text-dim); font-size: 13.5px; padding: 6px 0; }
  .spinner { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border-strong); border-top-color: var(--accent-strong); animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 段 1:识别行 */
  .recog { margin: 2px 0 14px; font-size: 13.5px; color: var(--text-dim); }
  .recog b { color: var(--accent-strong); }
  .mock-note { display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 11.5px; color: var(--st-assume); background: #fbbf2412; border: 1px solid #fbbf2433; border-radius: 8px; padding: 5px 10px; line-height: 1.4; }

  /* 通用块 */
  .block { border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-elev); padding: 16px 18px; margin-bottom: 12px; opacity: 0; transform: translateY(8px); transition: opacity .4s ease, transform .4s ease; }
  .block.show { opacity: 1; transform: none; }
  .block-head { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; }
  .block-head .bi { width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0; display: grid; place-items: center; font-size: 12px; font-weight: 700; background: var(--accent-soft); color: var(--accent-strong); }
  .block-head h3 { font-size: 14.5px; }
  .block-head .tag { margin-left: auto; font-size: 11px; color: var(--text-faint); font-family: var(--mono); border: 1px solid var(--border); padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
  .block-sub { font-size: 12.5px; color: var(--text-faint); margin-bottom: 14px; line-height: 1.5; }

  /* 段 2:计划步骤 */
  .steps { display: flex; flex-direction: column; gap: 9px; }
  .step { display: flex; gap: 11px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; background: var(--bg-elev-2); min-width: 0; opacity: 0; transform: translateY(6px); transition: opacity .35s ease, transform .35s ease; }
  .step.show { opacity: 1; transform: none; }
  .step .sn { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; font-size: 12px; font-weight: 700; background: var(--bg-elev); border: 1px solid var(--border-strong); color: var(--text-dim); }
  .step .sc { min-width: 0; flex: 1; }
  .step .st-title { font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .step .st-desc { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }
  .step .st-cap { font-size: 11px; color: var(--text-faint); font-family: var(--mono); margin-top: 5px; }
  .step .st-cap b { color: var(--accent-strong); font-weight: 600; }

  /* 假设区 */
  .assume-box { margin-top: 14px; border: 1px solid #fbbf2433; background: #fbbf2410; border-radius: var(--radius-sm); padding: 12px 13px; }
  .assume-box .ab-h { font-size: 12px; color: var(--st-assume); font-weight: 600; margin-bottom: 9px; display: flex; align-items: center; gap: 6px; }
  .assume { display: flex; align-items: flex-start; gap: 8px; width: 100%; text-align: left; cursor: pointer; background: transparent; border: none; border-radius: 7px; padding: 6px 8px; color: var(--text); font-size: 12.5px; line-height: 1.45; transition: background .12s ease; }
  .assume:hover { background: #fbbf2418; }
  .assume:focus-visible { outline: none; box-shadow: 0 0 0 2px #fbbf2455; }
  .assume .ai { color: var(--st-assume); flex-shrink: 0; }
  .assume .at b { color: var(--text); font-weight: 600; }
  .assume .edit-hint { color: var(--text-faint); font-size: 11px; margin-left: 6px; }
  .assume.edited .at { color: var(--st-done); }
  .assume.edited .ai { color: var(--st-done); }

  /* 计划确认操作条 */
  .plan-actions { margin-top: 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .btn-confirm { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; background: linear-gradient(135deg, var(--accent), var(--accent-strong)); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px 18px; font-size: 13.5px; font-weight: 650; touch-action: manipulation; transition: filter .15s ease, transform .1s ease, opacity .15s ease; }
  .btn-confirm:hover { filter: brightness(1.08); }
  .btn-confirm:active { transform: translateY(1px); }
  .btn-confirm:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-soft); }
  .btn-edit { cursor: pointer; background: transparent; color: var(--text-dim); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 16px; font-size: 13px; transition: border-color .15s ease, color .15s ease; }
  .btn-edit:hover { border-color: var(--border-strong); color: var(--text); }
  .btn-edit:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-soft); }
  .plan-actions .confirmed-tip { font-size: 12.5px; color: var(--st-done); display: inline-flex; align-items: center; gap: 6px; }

  /* 段 3:执行进度 */
  .exec { display: flex; flex-direction: column; gap: 8px; }
  .erow { display: flex; align-items: center; gap: 11px; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-elev-2); min-width: 0; }
  .erow .ei { width: 20px; height: 20px; flex-shrink: 0; display: grid; place-items: center; }
  .erow .etx { min-width: 0; flex: 1; font-size: 13px; }
  .erow .etx .cap { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); }
  .erow .est { font-size: 11.5px; font-weight: 600; white-space: nowrap; }
  .erow[data-st="pending"] { opacity: .55; }
  .erow[data-st="pending"] .est { color: var(--text-faint); }
  .erow[data-st="running"] .est { color: var(--accent-strong); }
  .erow[data-st="done"] .est { color: var(--st-done); }
  .dot-run { width: 13px; height: 13px; border-radius: 50%; border: 2px solid var(--border-strong); border-top-color: var(--accent-strong); animation: spin .7s linear infinite; }
  .tick { color: var(--st-done); font-weight: 700; }

  /* 段 4:最终方案 */
  .plan-card { border: 1px solid var(--border); border-radius: var(--radius-sm); background: linear-gradient(180deg, var(--bg-elev-2), var(--bg-elev)); overflow: hidden; }
  .plan-card .ph { padding: 11px 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .plan-card .ph .file { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
  .plan-card .ph .badge { margin-left: auto; font-size: 11px; color: var(--st-done); background: #34d39915; border: 1px solid #34d39930; padding: 2px 9px; border-radius: 999px; }
  .plan-body { padding: 15px; font-size: 13.5px; }
  .plan-body h4 { font-size: 13px; color: var(--text-dim); margin: 15px 0 7px; }
  .plan-body h4:first-child { margin-top: 0; }
  .plan-body p, .plan-body ul { margin: 0 0 6px; }
  .plan-body ul { padding-left: 18px; }
  .plan-body li { margin-bottom: 4px; }

  /* 时间线 */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .tl { display: flex; gap: 12px; padding-bottom: 12px; position: relative; }
  .tl:not(:last-child)::before { content: ""; position: absolute; left: 6px; top: 16px; bottom: -2px; width: 2px; background: var(--border); }
  .tl .tw { flex-shrink: 0; font-family: var(--mono); font-size: 11px; color: var(--accent-strong); background: var(--accent-soft); border-radius: 999px; padding: 1px 8px; height: fit-content; z-index: 1; }
  .tl .tdot { position: absolute; left: 3px; top: 5px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent-strong); z-index: 2; }
  .tl .tt { font-size: 13px; }
  .tl .tt b { font-weight: 600; }
  .tl .tt .td { color: var(--text-dim); font-size: 12px; }

  /* 产出物清单 */
  .deliv { display: flex; flex-wrap: wrap; gap: 8px; }
  .deliv span { font-size: 12px; color: var(--text); background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 11px; display: inline-flex; align-items: center; gap: 6px; }
  .deliv span::before { content: "📄"; font-size: 11px; }

  .assign { display: flex; flex-direction: column; gap: 6px; }
  .assign .ar { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .assign .ar .ocap { font-family: var(--mono); color: var(--accent-strong); font-size: 12px; min-width: 190px; }
  .assign .ar .what { color: var(--text-dim); flex: 1; }
  .kind-skill, .kind-tool { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 5px; text-transform: uppercase; letter-spacing: .03em; flex-shrink: 0; }
  .kind-skill { color: var(--accent-strong); background: var(--accent-soft); }
  .kind-tool { color: var(--st-assume); background: #fbbf2415; }

  /* 方案后续操作 */
  .final-actions { margin-top: 14px; display: flex; gap: 9px; flex-wrap: wrap; }
  .fa-btn { cursor: pointer; background: var(--bg-elev-2); color: var(--text-dim); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 14px; font-size: 12.5px; display: inline-flex; align-items: center; gap: 7px; transition: border-color .15s ease, color .15s ease; }
  .fa-btn:hover { border-color: var(--accent); color: var(--text); }
  .fa-btn:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-soft); }

  /* DB 留痕折叠卡 */
  .db-fold { border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-elev); overflow: hidden; }
  .db-fold > summary { cursor: pointer; list-style: none; padding: 13px 16px; display: flex; align-items: center; gap: 9px; font-size: 13.5px; font-weight: 600; }
  .db-fold > summary::-webkit-details-marker { display: none; }
  .db-fold > summary .chev { margin-left: auto; color: var(--text-faint); transition: transform .2s ease; }
  .db-fold[open] > summary .chev { transform: rotate(90deg); }
  .db-fold > summary:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--accent-soft); }
  .db-body { padding: 4px 16px 14px; border-top: 1px solid var(--border); }
  .trace { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .trace:last-child { border-bottom: none; }
  .trace .ti { width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; display: grid; place-items: center; font-size: 11px; background: var(--bg-elev-2); border: 1px solid var(--border); }
  .trace .tt { font-size: 12.5px; }
  .trace .tbl { font-family: var(--mono); font-size: 11px; color: var(--accent-strong); }
  .trace .td { font-size: 11px; color: var(--text-faint); }
  .db-hint { margin-top: 10px; font-size: 11.5px; color: var(--text-faint); line-height: 1.5; }
  .db-hint b { color: var(--text-dim); }

  /* 浏览视图 */
  .browse h2 { font-size: 18px; margin-bottom: 4px; }
  .browse .sub { color: var(--text-dim); font-size: 13px; margin-bottom: 18px; }
  .cap-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  @media (max-width: 640px) { .cap-grid { grid-template-columns: 1fr; } }
  .cap-card { border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-elev); padding: 14px 15px; min-width: 0; }
  .cap-card .top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .cap-card .cid { font-family: var(--mono); font-size: 12.5px; }
  .cap-card .ctype { font-size: 10px; padding: 1px 6px; border-radius: 5px; text-transform: uppercase; letter-spacing: .03em; }
  .ctype.skill { color: var(--accent-strong); background: var(--accent-soft); }
  .ctype.tool { color: var(--st-assume); background: #fbbf2415; }
  .cap-card .status { margin-left: auto; font-size: 10.5px; color: var(--st-done); }
  .cap-card .cname { font-size: 13.5px; font-weight: 600; margin-bottom: 4px; }
  .cap-card .cowner { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
  .cap-card .cowner b { color: var(--text); font-weight: 600; }
  .cap-card .tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .cap-card .tags span { font-size: 11px; color: var(--text-faint); background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; }

  /* 底部输入 */
  .composer { border-top: 1px solid var(--border); background: linear-gradient(180deg, transparent, var(--bg) 40%); padding: 14px 24px 18px; }
  .composer-inner { max-width: 860px; margin: 0 auto; }
  .input-wrap { display: flex; align-items: flex-end; gap: 10px; background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 8px 8px 8px 14px; transition: border-color .15s ease, box-shadow .15s ease; }
  .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .input-wrap textarea { flex: 1; resize: none; background: transparent; color: var(--text); border: none; outline: none; font-family: var(--font); font-size: 14px; line-height: 1.5; padding: 6px 0; max-height: 140px; min-height: 24px; }
  .send { width: 38px; height: 38px; flex-shrink: 0; cursor: pointer; border: none; border-radius: var(--radius-sm); background: linear-gradient(135deg, var(--accent), var(--accent-strong)); color: #fff; display: grid; place-items: center; touch-action: manipulation; transition: filter .15s ease, opacity .15s ease, transform .1s ease; }
  .send:hover { filter: brightness(1.08); }
  .send:active { transform: translateY(1px); }
  .send:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-soft); }
  .send:disabled { opacity: .5; cursor: not-allowed; }
  .composer .hint { text-align: center; font-size: 11px; color: var(--text-faint); margin-top: 8px; }

  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; } }
</style>
</head>
<body>
<a href="#composer" class="skip">跳到输入框</a>
<div class="app">
  <!-- ============ 左侧栏 ============ -->
  <nav class="sidebar" aria-label="导航">
    <div class="brand">
      <div class="logo" aria-hidden="true">研</div>
      <div class="bt"><b>用研 Orchestrator</b><span>Agent Harness</span></div>
    </div>

    <button type="button" class="new-task" id="newTask">
      <span aria-hidden="true">＋</span> 新建任务
    </button>

    <div class="side-scroll">
      <div class="side-group" role="group" aria-label="历史任务">
        <div class="lbl">历史任务</div>
        <button type="button" class="side-item" data-load="live"><span class="ic" aria-hidden="true">◷</span><span class="tx">直播场域用户体验研究</span></button>
        <button type="button" class="side-item" data-load="competitive"><span class="ic" aria-hidden="true">◷</span><span class="tx">数字人竞品分析</span></button>

        '<div class="st-cap">' + capLine + '</div>' +
        '</div></div>';
    }).join("");

    var assumeHtml = data.assumptions.map(function (a, i) {
      return '<button type="button" class="assume" data-ai="' + i + '"><span class="ai" aria-hidden="true">✎</span>' +
        '<span class="at">假设「' + esc(a.k) + '」为 <b class="av">' + esc(a.v) + '</b><span class="edit-hint">点击可改</span></span></button>';
    }).join("");

    el.innerHTML =
      '<div class="block-head"><span class="bi" aria-hidden="true">✓</span><h3>待执行计划</h3><span class="tag">plan · 待确认</span></div>' +
      '<div class="block-sub">已按<b>' + esc(TASK_TYPE_LABEL[data.task_type]) + '</b>裁剪:略过 ' + esc(skips) + ' 等无关环节。你可修改下方假设,或直接确认执行。</div>' +
      '<div class="steps">' + stepsHtml + '</div>' +
      '<div class="assume-box"><div class="ab-h"><span aria-hidden="true">✎</span> 系统假设(信息缺失处已代填,点击可改)</div>' + assumeHtml + '</div>' +
      '<div class="plan-actions"><button type="button" class="btn-confirm">✓ 确认计划,开始执行</button>' +
      '<button type="button" class="btn-edit">修改需求</button></div>';

    // 假设编辑(用 prompt 简化,原型足够)
    el.querySelectorAll(".assume").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var idx = +btn.dataset.ai;
        var cur = data.assumptions[idx];
        var next = window.prompt("修改假设「" + cur.k + "」:", cur.v);
        if (next != null && next.trim()) {
          cur.v = next.trim();
          btn.querySelector(".av").textContent = cur.v;
          btn.classList.add("edited");
          btn.querySelector(".edit-hint").textContent = "已修改";
        }
      });
    });
    el.querySelector(".btn-edit").addEventListener("click", function () {
      els.query.value = data.query; els.query.focus();
      els.query.style.height = "auto"; els.query.style.height = Math.min(els.query.scrollHeight, 140) + "px";
    });
    el.querySelector(".btn-confirm").addEventListener("click", function () {
      if (el.dataset.confirmed) return;
      el.dataset.confirmed = "1";
      var actions = el.querySelector(".plan-actions");
      actions.innerHTML = '<span class="confirmed-tip"><span aria-hidden="true">✓</span> 计划已确认,开始执行</span>';
      runExecution(data, sysBody);
    });
    return el;
  }

  // ---------- 段 3:执行进度 ----------
  function runExecution(data, sysBody) {
    var el = document.createElement("div");
    el.className = "block";
    var rows = data.plan_steps.map(function (s, i) {
      return '<div class="erow" data-st="pending" data-i="' + i + '"><span class="ei" aria-hidden="true">•</span>' +
        '<span class="etx">' + esc(s.t) + ' <span class="cap">' + esc(s.cap) + '</span></span>' +
        '<span class="est">等待</span></div>';
    }).join("");
    el.innerHTML = '<div class="block-head"><span class="bi" aria-hidden="true">▷</span><h3>执行进度</h3><span class="tag">execution_log</span></div>' +
      '<div class="exec">' + rows + '</div>';
    sysBody.appendChild(el);
    after(60, function () { el.classList.add("show"); scrollBottom(); });

    var rowEls = el.querySelectorAll(".erow");
    var delay = 400;
    data.plan_steps.forEach(function (s, i) {
      var row = rowEls[i];
      after(delay, function () {
        row.dataset.st = "running";
        row.querySelector(".ei").innerHTML = '<span class="dot-run" aria-hidden="true"></span>';
        row.querySelector(".est").textContent = s.kind === "tool" ? "调用工具…" : "调用中…";
        scrollBottom();
      });
      after(delay + 520, function () {
        row.dataset.st = "done";
        row.querySelector(".ei").innerHTML = '<span class="tick">✓</span>';
        row.querySelector(".est").textContent = "完成";
        scrollBottom();
      });
      delay += 900;
    });

    // 段 4:最终方案
    after(delay + 200, function () {
      var b4 = blockFinal(data);
      sysBody.appendChild(b4);
      after(60, function () { b4.classList.add("show"); scrollBottom(); });
      var b5 = blockDB();
      sysBody.appendChild(b5);
      after(200, function () { b5.classList.add("show"); scrollBottom(); running = false; els.sendBtn.disabled = false; els.query.value = ""; els.query.style.height = "auto"; });
    });
  }

  // ---------- 段 4:最终方案 ----------
  function blockFinal(data) {
    var f = data.final;
    var tl = f.timeline.map(function (x) {
      return '<div class="tl"><span class="tdot" aria-hidden="true"></span><span class="tw">' + esc(x.w) + '</span>' +
        '<span class="tt"><b>' + esc(x.t) + '</b> — <span class="td">' + esc(x.d) + '</span></span></div>';
    }).join("");
    var dv = f.deliverables.map(function (d) { return '<span>' + esc(d) + '</span>'; }).join("");
    var asg = f.assign.map(function (a) {
      return '<div class="ar"><span class="ocap">' + esc(a.cap) + '</span><span class="kind-' + a.kind + '">' + a.kind + '</span>' +
        '<span class="what">' + esc(a.what) + '</span></div>';
    }).join("");

    var body =
      '<h4>研究目标</h4><p>' + esc(f.goal) + '</p>' +
      '<h4>目标用户</h4><p>' + esc(f.audience) + '</p>' +
      '<h4>执行流程与时间线</h4><div class="timeline">' + tl + '</div>' +
      '<h4>产出物清单</h4><div class="deliv">' + dv + '</div>' +
      '<h4>能力编排(自动调用)</h4><div class="assign">' + asg + '</div>';

    var inner = '<div class="plan-card"><div class="ph"><span class="file">research-plan.md</span><span class="badge">✓ 通过 schema 校验</span></div><div class="plan-body">' + body + '</div></div>' +
      '<div class="final-actions"><button type="button" class="fa-btn">👍 采纳方案</button>' +
      '<button type="button" class="fa-btn">⬇ 导出 .md</button>' +
      '<button type="button" class="fa-btn">📚 沉淀到 Wiki</button></div>';

    var el = document.createElement("div");
    el.className = "block";
    el.innerHTML = '<div class="block-head"><span class="bi" aria-hidden="true">★</span><h3>最终研究方案</h3><span class="tag">research-report.schema</span></div>' + inner;
    el.querySelectorAll(".fa-btn").forEach(function (b) {
      b.addEventListener("click", function () { b.textContent = "✓ 已" + b.textContent.replace(/^[^一-龥]*/, ""); b.style.color = "var(--st-done)"; b.style.borderColor = "var(--st-done)"; });
    });
    return el;
  }

  function blockDB() {
    var traces = TRACE_STEPS.map(function (s) {
      return '<div class="trace"><span class="ti" aria-hidden="true">' + s.i + '</span><div><div class="tt">' + esc(s.t) +
        '</div><div><span class="tbl">' + esc(s.bl) + '</span> <span class="td">· ' + esc(s.d) + '</span></div></div></div>';
    }).join("");
    var el = document.createElement("details");
    el.className = "db-fold block";
    el.innerHTML = '<summary><span aria-hidden="true">🗄</span> 全链路留痕 · 已写入 Memory DB<span class="chev" aria-hidden="true">›</span></summary>' +
      '<div class="db-body">' + traces + '<div class="db-hint"><b>只存运行时数据</b>,配置(skill / decision)留在 git YAML,可 diff、可回滚。</div></div>';
    return el;
  }
})();
</script>
</body>
</html>
