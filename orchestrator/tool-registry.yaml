# tool 轻量索引卡(方案 §2.3)
# 只保留发现/治理/预筛所需字段;执行边界(超时/重试/脱敏)在各 tool 的 manifest.yaml。
# 业务判断"什么任务该调我"不写在这里,由 LLM + skill 决定。

version: 1

tools:
  - id: o2-web-search
    name: o2 网页检索
    path: tools/o2-web-search/manifest.yaml
    adapter_type: fake
    auth_required: true
    risk_level: low
    status: active

  - id: jd-product-search
    name: 京东商品检索
    path: tools/jd-product-search/manifest.yaml
    adapter_type: o2
    auth_required: true
    risk_level: low
    status: active

  - id: tavily-web-search
    name: Tavily 通用网页搜索
    path: tools/tavily-web-search/manifest.yaml
    adapter_type: rest_json
    auth_required: true
    risk_level: low
    status: active

  - id: joyspace-search
    name: JoySpace 内部知识检索
    path: tools/joyspace-search/manifest.yaml
    adapter_type: webcli
    auth_required: true
    risk_level: low
    status: active

  - id: ai-spider-search
    name: 竞品截图库检索
    path: tools/ai-spider-search/manifest.yaml
    adapter_type: internal_api
    auth_required: true
    risk_level: low
    status: active

  # external-tools/*-lab:无鉴权 REST 工具,走 RestJsonAdapter(rest_json)。
  - id: aesthetic-quant-lab
    name: 美学量化实验室
    path: tools/aesthetic-quant-lab/manifest.yaml
    adapter_type: rest_json
    auth_required: false
    risk_level: low
    status: active

  - id: attention-analysis-lab
    name: 视觉注意力分析实验室
    path: tools/attention-analysis-lab/manifest.yaml
    adapter_type: rest_json
    auth_required: false
    risk_level: low
    status: active

  - id: experience-model-lab
    name: 体验模型实验室
    path: tools/experience-model-lab/manifest.yaml
    adapter_type: rest_json
    auth_required: false
    risk_level: low
    status: active

  - id: virtual-user-lab
    name: 虚拟用户实验室
    path: tools/virtual-user-lab/manifest.yaml
    adapter_type: rest_json
    auth_required: false
    risk_level: low
    status: active

  - id: vision-brand-lab
    name: 视觉品牌实验室
    path: tools/vision-brand-lab/manifest.yaml
    adapter_type: rest_json
    auth_required: false
    risk_level: low
    status: active
