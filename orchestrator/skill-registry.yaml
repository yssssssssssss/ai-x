# skill 发现索引 + 治理索引(方案 §2.2 / §2.3)
# 只登记机器需校验的轻量字段;能力逻辑/prompt/判断标准都在 SKILL.md 里。
# task_types/intent_tags 仅辅助检索与运营,不做硬路由。
# 若运行时支持原生 discovery,此文件可由 SKILL.md + manifest.yaml 自动生成。

version: 1

skills:
  - id: digital-human-competitive-analysis
    name: 数字人竞品分析
    path: skills/competitive-analysis/digital-human/SKILL.md
    when_to_use: 用户需要分析数字人、虚拟主播、直播竞品时使用
    owner: 竞品分析组
    status: active
    task_types: [competitive_research, user_research_planning]
    intent_tags: [digital_human, live_commerce, competitive]
    input_schema: skills/competitive-analysis/digital-human/input.schema.json
    output_schema: skills/competitive-analysis/digital-human/output.schema.json
    required_tools:
      - o2-web-search
      - ai-spider-search
      - experience-model-lab
      - virtual-user-lab
    cost_level: medium
    risk_level: low

  - id: design-experience-review
    name: 设计体验走查
    path: skills/design-review/SKILL.md
    when_to_use: 用户需要对设计稿/页面做美学、注意力、品牌视觉走查或体验评估时使用(需用户提供设计稿图像)
    owner: 体验设计组
    status: active
    task_types: [design_audit, user_research_planning]
    intent_tags: [design_review, aesthetic, attention, brand, visual]
    input_schema: skills/design-review/input.schema.json
    output_schema: skills/design-review/output.schema.json
    required_tools:
      - aesthetic-quant-lab
      - attention-analysis-lab
      - vision-brand-lab
    cost_level: low
    risk_level: low
