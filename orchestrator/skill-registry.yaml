  - id: accessibility-review
    name: accessibility-review
    path: knowledge-base/skills/accessibility-review
    entry: knowledge-base/skills/accessibility-review/SKILL.md
    when_to_use: 吃一个评估对象（App/页面/原型/设计稿/H5/小程序，可附截图·原型链接·线上页面·读屏录音录屏·流程或文字描述）+ 评估范围 →
      编排 research-wiki 的无障碍产品体验与适配规范（accessibility-adaptation：POUR 四原则、四类要求、9
      类控件详规、MUST/SHOULD/MUST NOT、A/B/C 定级、交付前
      checklist）、无障碍走查方法本体（accessibility-audit：开读屏[VoiceOver/TalkBack]线性遍历、视觉/读屏/键盘手势三遍走查节奏、对比度·触达区·文本缩放等
      WCAG 量化阈值）、问题分层与优先级（A/B/C、P0–P3、RICE 排整改）、可用性测试（真人验证边界）→
      给了素材时直接做一次无障碍走查，产出问题清单（问题×违反的规范条目[原则+控件]×等级
      A/B/C×读屏表现证据×分平台整改[Android/iOS/H5]）+ 按原则/等级汇总 + 整改清单（分平台改法+复测验证点）+ 修复优先级
      +《本次运行说明》；没给素材时产出一份无障碍走查工具包（交付前 checklist+A/B/C
      评级卡+读屏三遍法脚本+量化阈值速查+记录整改模板）并索要素材。当用户要「做无障碍审查/走查/适配检查/信息无障碍合规/a11y
      审查/无障碍验收/查这页面用读屏（VoiceOver/TalkBack）能不能用/视障（盲人）用户友不友好/按 WCAG
      检查这界面/上线前扫一遍无障碍/适老化后低视力·老年用户能不能看清用得了」时触发；哪怕只说「看看这页面对视障用户友不友好」并附截图，只要意图是拿无障碍规范、从视障/读屏可达性视角逐条检视界面、找适配问题并给整改，就用本
      skill。边界：拿尼尔森十大原则查通用可用性问题（不专门针对视障/读屏）→
      run-heuristic-evaluation；让真实用户（含视障）做任务并观察 →
      generate-usability-test；竞品战略意图对比 → competitive-analysis；把海量反馈打标归类 →
      code-open-feedback；把文档/PPT/PDF 做成无障碍版（补替代文本、阅读顺序等，非界面走查）不属本 skill。
    domain: [design_audit, user_research]
    owner: 用研团队
    risk_level: low
    task_types:
      - a11y_audit
    status: active
  - id: analyze-satisfaction
    name: analyze-satisfaction
    path: knowledge-base/skills/analyze-satisfaction
    entry: knowledge-base/skills/analyze-satisfaction/SKILL.md
    when_to_use: 吃一批满意度调研数据——总体满意度 / NSS / NPS / CSAT / CES
      加各属性（体验维度）评分的截面数据，或同一指标的多期时间序列——加一个分析目标 →
      实时调用用研知识库（research-wiki）里的满意度驱动因素分析（KDA / 派生重要性）、满意度分析模型（四分图 / Kano / AHP
      / SEM）、满意度异动归因（显著性→下钻→根因）、数据标准化、期望确认理论 ECT 等正典 → 产出关键驱动因素排序 + IPA
      重要性×表现四分图改进优先级 + 掉分归因（区分是波动还是异常、下钻到「谁在哪个模块为什么不满」），并附《本次运行说明》。当用户手里有满意度 /
      NSS / NPS 分数（带属性分或时间序列），想「分析满意度数据 / 找关键驱动因素 / 先改哪个属性 / 做 IPA 四分图 /
      满意度为什么掉了 / NSS 环比下降怎么归因 / 这版上线后体验涨了还是跌了 / 算各体验维度的重要性权重 / 满意度诊断」时，主动使用本
      skill——哪怕用户只是丢来一张属性满意度评分表、或两期 NSS 分数问「怎么分析 /
      说明了什么」、没点名「驱动分析」「IPA」「归因」，只要意图是把满意度分数诊断成驱动因素、改进优先级或掉分根因，就应触发。边界：①
      还没有数据、要设计满意度问卷（采集阶段）→ generate-survey；② 把海量开放题 / 评价 /
      工单的文字编码成痛点清单（纯定性文本、不是分数）→ code-open-feedback；③ 通用问卷交叉表分群显著性对比（如「会员 vs
      非会员谁更满意」这类与满意度诊断流程无关的列联表检验）→ survey-crosstab-analysis。本 skill
      专做满意度分数的定量诊断与归因；若用户给的数据不足以支撑所问分析（要找驱动却只给汇总均值没有逐份行级数据、要归因却没给样本量与可下钻维度、要算落差却缺期望或感知），会先列《数据补充请求》请其补齐再分析，绝不靠假设硬出结论。
    domain: [user_research]
    owner: 用研团队
    risk_level: low
    task_types:
      - voc_diagnosis
    status: active
  - id: build-experience-metrics
    name: build-experience-metrics
    path: knowledge-base/skills/build-experience-metrics
    entry: knowledge-base/skills/build-experience-metrics/SKILL.md
    when_to_use: 吃一个产品/系统 + 业务目标（要达成什么、哪些底线不可恶化）→
      实时调用用研知识库（research-wiki）的体验度量（HEART/GSM）、跨版本纵向/基准追踪、数据标准化、B
      端体验度量打法、标准化体验量表等正典 → 产出一套**可落地的体验度量体系**：用 GSM（目标→信号→指标）选定 HEART
      三到五维、定**体验北极星 +
      护栏指标**、写清每个指标的**采集口径**（分子分母/周期/样本来源/量表与基准）、把北极星**拆解**到子系统或任务触点、配**跨版本纵向追踪方案**（口径冻结+基线+适应期再测），并附指标质量自检与《本次运行说明》。当用户要「给某产品/系统设计体验度量体系
      / 搭体验看板 / 定（体验）北极星与护栏 / 用 HEART 选指标 / 做 GSM / 量化产品体验看上线或改版后涨没涨该看哪些数 / 给 B
      端定可长期追踪的体验北极星并拆解到模块 / 建 UX 基准做跨版本 benchmark 追踪」时主动使用——哪怕只说「帮我想想这产品体验该看哪些指标
      / 这次改版体验收益怎么衡量」、没点名 HEART 或北极星，只要意图是把产品+目标变成一套可持续追踪的体验度量体系就应触发。边界：①
      已有满意度/NSS/NPS 分数要诊断「先改哪、为什么掉、涨没涨」→ `analyze-satisfaction`（本 skill
      更前一步：先把指标和口径建起来）；② 要可投放的问卷成稿 → `generate-survey`；③
      要可用性测试执行包（任务脚本/SEQ·SUS）→ `generate-usability-test`；④ 要把海量评价/工单文本编码成痛点 →
      `code-open-feedback`；⑤ 要的是通用业务/销售/经营看板（GMV、DAU、转化、库存等）或 OKR/KPI
      绩效考核——与体验无关、不属本 skill；本 skill
      只建「用户体验」度量（HEART：愉悦/参与/采纳/留存/任务成功），北极星是体验北极星、非 DAU/GMV 增长北极星。
    domain: [user_research]
    owner: 用研团队
    risk_level: low
    task_types:
      - user_research_planning
    status: active
  - id: code-open-feedback
    name: code-open-feedback
    path: knowledge-base/skills/code-open-feedback
    entry: knowledge-base/skills/code-open-feedback/SKILL.md
    when_to_use: 吃研究员上传的一批海量、非结构化的用户短反馈（应用商店评价 / 客服工单 / 问卷开放题 / 社媒吐槽与评论 /
      在线客服会话等任意来源）→ 实时调用用研知识库（research-wiki）里的 VOC 用户之声分析正典 →
      产出结构化编码标签库（模块×问题类型×情感×严重度）+ 各主题频次·占负面比·情感趋势的主题表 + Top
      痛点清单（每条配代表原话）+《本次运行说明》。当用户手里有一批评价/工单/开放题/评论/吐槽，要「编码 / 打标 / 给反馈分类归类 / 跑一下
      VOC / 做用户之声分析 / 把海量反馈整理成痛点清单 / 看大家都在抱怨什么 / 分析这批差评」时，主动使用本
      skill——哪怕用户只是丢来一坨反馈文本、没点名「编码」或「VOC」，只要意图是把海量非结构化短反馈转成带频次和情感的量化标签与痛点清单，就应触发。边界：①
      结构化问卷交叉表/列联表要做显著性检验与平台优劣势，用 survey-crosstab-analysis（本 skill
      只做计数、不做统计检验）；② 少量访谈逐字稿要做深读、三进程编码与意义诠释（小样本定性纵深），那是 qualitative-coding 的活；③
      设计问卷/访谈题目（还没有数据的采集阶段）用 generate-survey / generate-interview-guide。
    domain: [user_research]
    owner: 用研团队
    risk_level: low
    task_types:
      - voc_diagnosis
    status: active
  - id: competitive-analysis
    name: competitive-analysis
    path: knowledge-base/skills/competitive-analysis
    entry: knowledge-base/skills/competitive-analysis/SKILL.md
    when_to_use: 吃一个竞品分析诉求（分析/对比哪些竞品 +
      可观测素材：功能更新·截图·信息架构·运营活动·价格会员补贴·用户评价，或足够具体的文字描述）+ 我方定位·生命周期阶段·用户特征（先知己再知彼）→
      编排 research-wiki 的竞品分析方法本体（按生命周期定目标、分层监控划范围、战略意图四问[时机·场景·动机·市场]、AARRR
      海盗模型环节映射、SWOT 敌我优劣、用户体验五要素拆解、打勾对比法、跟进决策矩阵）与桌面研究、机会点研究、KANO →
      给了素材时直接做一次竞品分析，从"记录对手做了什么"走向"读懂为什么这么做、对我方何影响、我方如何行动"，产出知己小结+竞品分层+逐动作战略意图四问（含
      AARRR 映射与
      SWOT）+五要素拆解与打勾对比+结果解读（战术/战略/布局）+跟进决策矩阵+差异化行动建议+《本次运行说明》；没给素材时产出一份竞品分析框架/工具包并索要素材。当用户要「做竞品分析/对比我们和某竞品/竞对上线了
      XX
      是什么意图·威胁多大·要不要跟/持续监控竞对动态读懂战略意图/起步期看赛道机会与威胁/竞品体验横评」时触发；哪怕只说「看看拼多多这新功能想干嘛、对我们有没有威胁」或「我们和淘宝购物车比一比」，只要意图是系统比较竞对产品/功能/策略、读懂战略意图、判断对我方影响并给应对，就用本
      skill。边界：拿尼尔森十大原则逐条查界面可用性问题并打严重度（哪怕竞品页面，重点在界面哪不好用）→
      run-heuristic-evaluation；让真实用户做任务并观察 →
      generate-usability-test；给自己产品搭长期体验指标体系/看板 →
      build-experience-metrics；脱离竞品系统挖增长机会点 →
      opportunity-research；对策略型产品做微观量化评测/GSB 打分（图搜/推荐评测）不在本 skill。
    domain: [user_research, cross_cutting]
    owner: 用研团队
    risk_level: low
    task_types:
      - competitive_research
