  - id: synthesize-qualitative-insights
    name: synthesize-qualitative-insights
    path: knowledge-base/skills/synthesize-qualitative-insights
    entry: knowledge-base/skills/synthesize-qualitative-insights/SKILL.md
    when_to_use: 吃多份定性材料（多场访谈小结 / 逐字稿 / 定性笔记 / 开放题 / 客服工单等）+ 一个研究目标 →
      实时调用用研知识库（research-wiki）里的亲和图法、质性编码、定性洞察四框架与「结果→结论→洞察」模型 →
      先跨场自下而上归纳出多层主题（每个主题带频次、代表证据、设计机会 D / 待研究问题 Q），再把主题拔高成结构化洞察（用户 + 场景 + 任务 +
      情感需求 + 矛盾障碍），并附《本次运行说明》。当用户手里有多份定性材料、想「归纳主题 / 聚类发现 / 做亲和图 / 提炼洞察 /
      看这些访谈说明了什么 / 把一堆访谈记录变成结论 / 跨场总结用户痛点与需求」时，主动使用本
      skill——哪怕用户只是丢来几份访谈记录问「能看出什么」、没点名「亲和图」或「洞察」二字，只要意图是把多份定性资料横向归纳、再向上提炼成洞察，就应触发。交付时默认产出「剥离方法论、按用户研究问题组织、结论先行」的交付稿，方法论痕迹与《本次运行说明》收进后置的「分析底稿」附录；洞察之后若用户要「机会
      / 方向 / 落地 / 命名」，再按需编排既有正典延伸出轻量落地建议（机会-解决方案树 OST，方案标为待验证假设），并可给可视化摘要（一页纸 /
      PPT 大纲 / 结论示意图）。
    domain: [user_research]
    owner: 用研团队
    risk_level: low
    task_types:
