id: attention-analysis-lab
name: 视觉注意力分析实验室
adapter_type: rest_json
entrypoint: /api/analyze
base_url_env: ATTENTION_ANALYSIS_BASE_URL
auth_required: false
risk_level: low
approver_rule: none
timeout_seconds: 60
retry_policy:
  max_attempts: 2
  backoff_seconds: 3
input_schema: tools/attention-analysis-lab/input.schema.json
output_schema: tools/attention-analysis-lab/output.schema.json
redaction_policy:
  pii: mask
  sensitive_business_data: block
image_input_fields:
  - field: image
    role: design
    required: false
    min_items: 0
    max_items: 1
    accepted_mime_types: [image/jpeg, image/png, image/webp]
