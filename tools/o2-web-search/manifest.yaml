id: o2-web-search
name: o2 网页检索
adapter_type: o2
entrypoint: o2 web-search
auth_required: true
risk_level: low
approver_rule: none
timeout_seconds: 60
retry_policy:
  max_attempts: 2
  backoff_seconds: 3
input_schema: tools/o2-web-search/input.schema.json
output_schema: tools/o2-web-search/output.schema.json
redaction_policy:
  pii: mask
  sensitive_business_data: block
